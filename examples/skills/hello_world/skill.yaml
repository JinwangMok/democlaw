name: hello_world
description: "A simple greeting skill that demonstrates custom skill creation"
version: "1.0.0"
author: "DemoClaw"
entry_point: hello.py
input_schema:
  type: object
  properties:
    name:
      type: string
      description: "Name to greet"
      default: "World"
output_schema:
  type: object
  properties:
    message:
      type: string
      description: "Greeting message"
