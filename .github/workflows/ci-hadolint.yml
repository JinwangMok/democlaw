name: Hadolint

on:
  push:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - ".github/workflows/ci-hadolint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - ".github/workflows/ci-hadolint.yml"

permissions:
  contents: read

jobs:
  hadolint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find Dockerfiles
        id: find-dockerfiles
        run: |
          dockerfiles=$(find . -name 'Dockerfile' -not -path './.git/*' -not -path './.omc/*' | sort)
          echo "Found Dockerfiles:"
          echo "$dockerfiles"
          if [ -z "$dockerfiles" ]; then
            echo "No Dockerfiles found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install hadolint
        if: steps.find-dockerfiles.outputs.found == 'true'
        run: |
          HADOLINT_VERSION="v2.12.0"
          curl -sL "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64" \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
          hadolint --version

      - name: Run hadolint
        if: steps.find-dockerfiles.outputs.found == 'true'
        run: |
          exit_code=0
          while IFS= read -r dockerfile; do
            echo "::group::Checking $dockerfile"
            if hadolint "$dockerfile"; then
              echo "✓ $dockerfile passed"
            else
              echo "✗ $dockerfile failed"
              exit_code=1
            fi
            echo "::endgroup::"
          done < <(find . -name 'Dockerfile' -not -path './.git/*' -not -path './.omc/*' | sort)
          exit "$exit_code"
