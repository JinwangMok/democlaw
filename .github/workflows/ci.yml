name: CI

# Runs on every push and pull_request to any branch.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint and syntax-check shell scripts (shellcheck + bash -n)
  #
  # Two complementary checks run for every shell script:
  #   1. bash -n  — zero-dependency syntax validation (no external tools)
  #   2. shellcheck — static analysis / linting with inline GitHub annotations
  # ---------------------------------------------------------------------------
  shellcheck:
    name: ShellCheck (lint + bash -n syntax)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          echo "ShellCheck version: $(shellcheck --version | grep 'version:')"

      - name: Discover shell scripts
        id: discover
        run: |
          mapfile -t scripts < <(git ls-files '*.sh' | sort)
          count="${#scripts[@]}"
          echo "Found ${count} shell script(s):"
          printf '  %s\n' "${scripts[@]}"
          if [ "$count" -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true"  >> "$GITHUB_OUTPUT"
            echo "count=${count}" >> "$GITHUB_OUTPUT"
          fi

      - name: Syntax validation (bash -n)
        if: steps.discover.outputs.found == 'true'
        run: |
          exit_code=0
          passed=0
          failed=0
          while IFS= read -r script; do
            echo "::group::bash -n ${script}"
            if bash -n "${script}" 2>&1; then
              echo "✓ ${script} — syntax OK"
              passed=$((passed + 1))
            else
              echo "✗ ${script} — syntax ERROR"
              failed=$((failed + 1))
              exit_code=1
            fi
            echo "::endgroup::"
          done < <(git ls-files '*.sh' | sort)
          echo ""
          echo "bash -n: passed=${passed} failed=${failed} total=$((passed + failed))"
          exit "${exit_code}"

      - name: Static analysis (shellcheck)
        if: steps.discover.outputs.found == 'true'
        run: |
          exit_code=0
          passed=0
          failed=0
          while IFS= read -r script; do
            echo "::group::shellcheck ${script}"
            # --format=gcc emits GCC-style annotations rendered inline by GitHub.
            # --source-path=scripts resolves `# shellcheck source=lib/runtime.sh`
            # directives used in the top-level orchestration scripts.
            if shellcheck \
                --severity=warning \
                --shell=bash \
                --format=gcc \
                --source-path=scripts \
                "${script}"; then
              echo "✓ ${script} — passed"
              passed=$((passed + 1))
            else
              echo "✗ ${script} — failed"
              failed=$((failed + 1))
              exit_code=1
            fi
            echo "::endgroup::"
          done < <(git ls-files '*.sh' | sort)
          echo ""
          echo "shellcheck: passed=${passed} failed=${failed} total=$((passed + failed))"
          exit "${exit_code}"

  # ---------------------------------------------------------------------------
  # Lint Dockerfiles with hadolint
  #
  # Both the llama.cpp and OpenClaw Dockerfiles are linted explicitly by path.
  # Project-specific rule suppressions live in .hadolint.yaml (repo root).
  # ---------------------------------------------------------------------------
  hadolint:
    name: Hadolint (Dockerfile syntax)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install hadolint v2.12.0
        run: |
          HADOLINT_VERSION="v2.12.0"
          sudo curl -sL \
            "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64" \
            -o /usr/local/bin/hadolint
          sudo chmod +x /usr/local/bin/hadolint
          hadolint --version

      - name: Show hadolint configuration
        run: |
          if [ -f .hadolint.yaml ]; then
            echo "=== Active .hadolint.yaml ==="
            cat .hadolint.yaml
          else
            echo "No .hadolint.yaml found — using hadolint defaults."
          fi

      - name: Lint llamacpp/Dockerfile
        run: |
          echo "::group::hadolint llamacpp/Dockerfile"
          hadolint llamacpp/Dockerfile
          echo "::endgroup::"
          echo "✓ llamacpp/Dockerfile — hadolint passed"

      - name: Lint openclaw/Dockerfile
        run: |
          echo "::group::hadolint openclaw/Dockerfile"
          hadolint openclaw/Dockerfile
          echo "::endgroup::"
          echo "✓ openclaw/Dockerfile — hadolint passed"

  # ---------------------------------------------------------------------------
  # Validate .env.example and Makefile syntax
  # ---------------------------------------------------------------------------
  repo-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Required files exist
        run: |
          status=0
          for f in README.md LICENSE .env.example Makefile markitdown/Dockerfile markitdown/server.py config/mcporter.json; do
            if [ -f "$f" ]; then
              echo "✓ $f exists"
            else
              echo "✗ $f is MISSING"
              status=1
            fi
          done
          exit "$status"

      - name: Validate Makefile syntax
        run: make -n help >/dev/null 2>&1

      - name: Shell scripts are executable
        run: |
          status=0
          while IFS= read -r script; do
            if [ -x "$script" ]; then
              echo "✓ $script is executable"
            else
              echo "✗ $script is NOT executable"
              status=1
            fi
          done < <(find . -name '*.sh' -not -path './.git/*' -not -path './.omc/*' | sort)
          exit "$status"

  # ---------------------------------------------------------------------------
  # Dry-run Docker image builds (CPU-only, no GPU tests, no push)
  #
  # llama.cpp Dockerfile: uses docker buildx build --check (dry-run syntax check).
  #   No GPU is required at build time (GPU is runtime-only for inference).
  #
  # OpenClaw Dockerfile: full build (ubuntu:24.04 base, fast and small).
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build (dry-run)
    runs-on: ubuntu-latest
    needs: [shellcheck, hadolint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # llama.cpp: dry-run syntax check via docker buildx build --check.
      # Does NOT execute RUN instructions, does NOT create a local image. No GPU required.
      - name: Dry-run build check — llamacpp/Dockerfile (Docker)
        run: |
          echo "::group::Dry-run build check: llamacpp/Dockerfile (docker buildx build --check)"
          echo "Validating Dockerfile syntax and structure only (no GPU required)."
          echo ""
          if docker buildx build --help 2>&1 | grep -q -- '--check'; then
            echo "Method: docker buildx build --check --no-cache ./llamacpp"
            docker buildx build --check --no-cache ./llamacpp
            check_exit=$?
          else
            echo "Method: hadolint fallback (Buildx --check not available)"
            HADOLINT_VERSION="v2.12.0"
            curl -fsSL \
              "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64" \
              -o /tmp/hadolint
            chmod +x /tmp/hadolint
            /tmp/hadolint llamacpp/Dockerfile
            check_exit=$?
          fi
          echo "::endgroup::"
          [ "${check_exit}" -eq 0 ] && \
            echo "✓ llamacpp/Dockerfile passed dry-run build verification (Docker)" || \
            { echo "✗ llamacpp/Dockerfile failed dry-run build verification"; exit "${check_exit}"; }

      # OpenClaw: full build (ubuntu:24.04 base image, practical in CI).
      - name: Build OpenClaw image (Docker)
        run: |
          echo "::group::Building OpenClaw Dockerfile with Docker"
          docker build --no-cache --tag democlaw/openclaw:ci-docker ./openclaw
          echo "::endgroup::"
          echo "✓ OpenClaw image built successfully (Docker)"

      # MarkItDown: full build (python:3.12-slim base, fast and small).
      - name: Build MarkItDown image (Docker)
        run: |
          echo "::group::Building MarkItDown Dockerfile with Docker"
          docker build --no-cache --tag democlaw/markitdown:ci-docker ./markitdown
          echo "::endgroup::"
          echo "✓ MarkItDown image built successfully (Docker)"

      - name: Verify images exist locally (not pushed)
        run: |
          docker image inspect democlaw/openclaw:ci-docker > /dev/null 2>&1
          echo "✓ democlaw/openclaw:ci-docker exists locally"
          docker image inspect democlaw/markitdown:ci-docker > /dev/null 2>&1
          echo "✓ democlaw/markitdown:ci-docker exists locally"
          echo ""
          echo "Dry-run complete — OpenClaw + MarkItDown built, llama.cpp syntax-checked, nothing pushed."

  # ---------------------------------------------------------------------------
  # Dry-run Podman image builds (CPU-only, no GPU tests, no push)
  #
  # llama.cpp Dockerfile: uses hadolint for syntax/lint validation.
  #   podman build does not support a --check / --dry-run flag equivalent.
  #   hadolint provides the same static Dockerfile validation without
  #   executing any build step.
  #   No GPU is required (GPU is runtime-only for inference).
  #
  # OpenClaw Dockerfile: full podman build (ubuntu:24.04 base, fast and small).
  # ---------------------------------------------------------------------------
  podman-build:
    name: Podman build (dry-run)
    runs-on: ubuntu-latest
    needs: [shellcheck, hadolint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Podman is available
        run: |
          podman --version || {
            echo "::error::Podman is not installed"
            exit 1
          }

      # llama.cpp: hadolint syntax check (podman has no --check/--dry-run equivalent).
      # Does NOT execute RUN instructions, does NOT create a local image. No GPU required.
      - name: Dry-run build check — llamacpp/Dockerfile (hadolint, Podman-compatible)
        run: |
          echo "::group::Dry-run build check: llamacpp/Dockerfile (hadolint)"
          echo "NOTE: podman build has no --check/--dry-run flag."
          echo "      Using hadolint for equivalent Dockerfile syntax validation."
          echo "      No GPU required."
          echo ""
          HADOLINT_VERSION="v2.12.0"
          echo "Downloading hadolint ${HADOLINT_VERSION}..."
          curl -fsSL \
            "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64" \
            -o /tmp/hadolint
          chmod +x /tmp/hadolint
          echo "Running: hadolint llamacpp/Dockerfile"
          /tmp/hadolint llamacpp/Dockerfile
          check_exit=$?
          echo "::endgroup::"
          [ "${check_exit}" -eq 0 ] && \
            echo "✓ llamacpp/Dockerfile passed dry-run lint check (hadolint, Podman-compatible)" || \
            { echo "✗ llamacpp/Dockerfile failed lint check (exit ${check_exit})"; exit "${check_exit}"; }

      # OpenClaw: full podman build (ubuntu:24.04 base image, practical in CI).
      - name: Build OpenClaw image (Podman)
        run: |
          echo "::group::Building OpenClaw Dockerfile with Podman"
          podman build --no-cache --tag democlaw/openclaw:ci-podman ./openclaw
          echo "::endgroup::"
          echo "✓ OpenClaw image built successfully (Podman)"

      # MarkItDown: full podman build (python:3.12-slim base, fast and small).
      - name: Build MarkItDown image (Podman)
        run: |
          echo "::group::Building MarkItDown Dockerfile with Podman"
          podman build --no-cache --tag democlaw/markitdown:ci-podman ./markitdown
          echo "::endgroup::"
          echo "✓ MarkItDown image built successfully (Podman)"

      - name: Verify images exist locally (not pushed)
        run: |
          podman image inspect democlaw/openclaw:ci-podman > /dev/null 2>&1
          echo "✓ democlaw/openclaw:ci-podman exists locally"
          podman image inspect democlaw/markitdown:ci-podman > /dev/null 2>&1
          echo "✓ democlaw/markitdown:ci-podman exists locally"
          echo ""
          echo "Dry-run complete — OpenClaw + MarkItDown built, llama.cpp syntax-checked, nothing pushed."

  # ---------------------------------------------------------------------------
  # Test the llama.cpp in-container healthcheck script against a mock HTTP server.
  # Validates that the healthcheck confirms /v1/models responds correctly.
  # No GPU or container runtime required — pure logic test.
  # ---------------------------------------------------------------------------
  llamacpp-healthcheck-logic:
    name: llama.cpp healthcheck logic (mock server)
    runs-on: ubuntu-latest
    needs: [shellcheck]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make healthcheck script executable
        run: chmod +x llamacpp/healthcheck.sh

      # -----------------------------------------------------------------------
      # Start mock llama.cpp server (happy path)
      # -----------------------------------------------------------------------
      - name: Start mock llama.cpp server on port 8000
        run: |
          python3 - <<'PYEOF' &
          import http.server, json, os

          MODEL = os.environ.get("MODEL_NAME", "Qwen3.5-9B-Q4_K_M")

          class Handler(http.server.BaseHTTPRequestHandler):
              def log_message(self, fmt, *args):
                  print(f"[mock-llamacpp] {fmt % args}")
              def send_json(self, code, body):
                  payload = json.dumps(body).encode()
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(payload)))
                  self.end_headers()
                  self.wfile.write(payload)
              def do_GET(self):
                  if self.path == "/health":
                      self.send_json(200, {})
                  elif self.path == "/v1/models":
                      self.send_json(200, {
                          "object": "list",
                          "data": [{"id": MODEL, "object": "model",
                                    "created": 1700000000, "owned_by": "llamacpp"}]
                      })
                  else:
                      self.send_response(404); self.end_headers()

          http.server.HTTPServer(("127.0.0.1", 8000), Handler).serve_forever()
          PYEOF
          echo $! > /tmp/mock_llamacpp.pid

      - name: Wait for mock server to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Mock llama.cpp server ready."; break
            fi
            sleep 1
          done
          curl -sf http://localhost:8000/health > /dev/null || {
            echo "ERROR: Mock server did not start"; exit 1
          }

      - name: Verify /v1/models returns model list (HTTP 200 + JSON)
        run: |
          echo "=== Direct /v1/models check ==="
          response=$(curl -sf http://localhost:8000/v1/models)
          echo "Response: $response"
          count=$(echo "$response" | python3 -c "
          import sys, json
          print(len(json.load(sys.stdin).get('data', [])))
          ")
          echo "Models listed: $count"
          [ "$count" -ge 1 ] || { echo "ERROR: no models listed"; exit 1; }
          echo "✓ /v1/models returned $count model(s)"

      - name: Run llamacpp/healthcheck.sh — happy path (expect exit 0)
        env:
          LLAMACPP_PORT: "8000"
        run: |
          echo "=== llamacpp/healthcheck.sh against mock llama.cpp server ==="
          ./llamacpp/healthcheck.sh
          echo "✓ healthcheck.sh exited 0 — PASS"

      - name: Stop mock llama.cpp server
        run: |
          [ -f /tmp/mock_llamacpp.pid ] && kill "$(cat /tmp/mock_llamacpp.pid)" 2>/dev/null || true
          rm -f /tmp/mock_llamacpp.pid
          echo "Mock server stopped."

      - name: Run llamacpp/healthcheck.sh — failure path (expect exit 1)
        env:
          LLAMACPP_PORT: "8000"
        run: |
          echo "=== llamacpp/healthcheck.sh with no server running ==="
          if ./llamacpp/healthcheck.sh 2>/dev/null; then
            echo "ERROR: script exited 0 but no server was running — FAIL"; exit 1
          fi
          echo "✓ healthcheck.sh correctly exited non-zero — PASS"

      # -----------------------------------------------------------------------
      # Static checks: Dockerfile HEALTHCHECK wiring
      # -----------------------------------------------------------------------
      - name: Verify Dockerfile HEALTHCHECK directive exists
        run: |
          grep -q "^HEALTHCHECK" llamacpp/Dockerfile && \
            echo "✓ HEALTHCHECK directive present in llamacpp/Dockerfile" || \
            { echo "✗ Missing HEALTHCHECK in llamacpp/Dockerfile"; exit 1; }

      - name: Verify Dockerfile HEALTHCHECK references healthcheck script
        run: |
          grep -q "healthcheck.sh" llamacpp/Dockerfile && \
            echo "✓ Dockerfile HEALTHCHECK references healthcheck.sh" || \
            { echo "✗ Dockerfile does not reference healthcheck.sh"; exit 1; }

      - name: Verify healthcheck script checks /v1/models endpoint
        run: |
          grep -q "/v1/models" llamacpp/healthcheck.sh && \
            echo "✓ llamacpp/healthcheck.sh verifies /v1/models endpoint" || \
            { echo "✗ healthcheck.sh does not check /v1/models"; exit 1; }

  # ---------------------------------------------------------------------------
  # Test the MarkItDown MCP server healthcheck script against a mock HTTP server.
  # No GPU or container runtime required — pure logic test.
  # ---------------------------------------------------------------------------
  markitdown-healthcheck-logic:
    name: MarkItDown healthcheck logic (mock server)
    runs-on: ubuntu-latest
    needs: [shellcheck]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make healthcheck script executable
        run: chmod +x markitdown/healthcheck.sh

      - name: Start mock MarkItDown MCP server on port 3001
        run: |
          python3 - <<'PYEOF' &
          import http.server, json

          class Handler(http.server.BaseHTTPRequestHandler):
              def log_message(self, fmt, *args):
                  print(f"[mock-markitdown] {fmt % args}")
              def do_GET(self):
                  if self.path == "/health":
                      body = json.dumps({"status": "ok", "service": "markitdown-mcp"}).encode()
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
                  elif self.path == "/sse":
                      self.send_response(405)
                      self.end_headers()
                  else:
                      self.send_response(404)
                      self.end_headers()

          http.server.HTTPServer(("127.0.0.1", 3001), Handler).serve_forever()
          PYEOF
          echo $! > /tmp/mock_markitdown.pid

      - name: Wait for mock server to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "Mock MarkItDown server ready."; break
            fi
            sleep 1
          done

      - name: Run markitdown/healthcheck.sh — happy path (expect exit 0)
        env:
          MARKITDOWN_PORT: "3001"
        run: |
          echo "=== markitdown/healthcheck.sh against mock server ==="
          ./markitdown/healthcheck.sh
          echo "✓ healthcheck.sh exited 0 — PASS"

      - name: Stop mock server
        run: |
          [ -f /tmp/mock_markitdown.pid ] && kill "$(cat /tmp/mock_markitdown.pid)" 2>/dev/null || true
          rm -f /tmp/mock_markitdown.pid

      - name: Run markitdown/healthcheck.sh — failure path (expect exit 1)
        env:
          MARKITDOWN_PORT: "3001"
        run: |
          echo "=== markitdown/healthcheck.sh with no server running ==="
          if ./markitdown/healthcheck.sh 2>/dev/null; then
            echo "ERROR: script exited 0 but no server was running — FAIL"; exit 1
          fi
          echo "✓ healthcheck.sh correctly exited non-zero — PASS"

      - name: Verify Dockerfile HEALTHCHECK references healthcheck script
        run: |
          grep -q "healthcheck.sh" markitdown/Dockerfile && \
            echo "✓ Dockerfile HEALTHCHECK references healthcheck.sh" || \
            { echo "✗ Dockerfile does not reference healthcheck.sh"; exit 1; }
