name: Healthcheck Logic

on:
  push:
    branches: [main]
    paths:
      - "vllm/healthcheck.sh"
      - "openclaw/healthcheck.sh"
      - "scripts/healthcheck.sh"
      - "scripts/healthcheck_vllm.sh"
      - "scripts/healthcheck_openclaw.sh"
      - "scripts/validate-api.sh"
      - ".github/workflows/ci-healthcheck.yml"
  pull_request:
    branches: [main]
    paths:
      - "vllm/healthcheck.sh"
      - "openclaw/healthcheck.sh"
      - "scripts/healthcheck.sh"
      - "scripts/healthcheck_vllm.sh"
      - "scripts/healthcheck_openclaw.sh"
      - "scripts/validate-api.sh"
      - ".github/workflows/ci-healthcheck.yml"

permissions:
  contents: read

# ---------------------------------------------------------------------------
# NOTE: No GPU runner is used.  All jobs test healthcheck *logic* by running
# the scripts against a lightweight Python mock server that mimics the vLLM
# OpenAI-compatible API.  End-to-end GPU tests are intentionally excluded.
# ---------------------------------------------------------------------------

jobs:
  # ---------------------------------------------------------------------------
  # Test the in-container healthcheck (vllm/healthcheck.sh) against a mock
  # vLLM HTTP server that returns the expected /health and /v1/models responses.
  # ---------------------------------------------------------------------------
  vllm-healthcheck-script:
    name: vLLM in-container healthcheck script
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make healthcheck script executable
        run: chmod +x vllm/healthcheck.sh

      # -----------------------------------------------------------------------
      # Write mock vLLM server to a file so indentation is unambiguous in YAML.
      # -----------------------------------------------------------------------
      - name: Write mock vLLM server script
        run: |
          cat > /tmp/mock_vllm_server.py << 'PYEOF'
          import http.server
          import json
          import os
          import sys

          MODEL_NAME = os.environ.get("MODEL_NAME", "Qwen/Qwen2.5-7B-Instruct-AWQ")

          class MockVllmHandler(http.server.BaseHTTPRequestHandler):
              def log_message(self, fmt, *args):
                  print(f"[mock-vllm] {fmt % args}", flush=True)

              def send_json(self, code, body):
                  payload = json.dumps(body).encode()
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(payload)))
                  self.end_headers()
                  self.wfile.write(payload)

              def do_GET(self):
                  if self.path == "/health":
                      self.send_json(200, {})
                  elif self.path == "/v1/models":
                      self.send_json(200, {
                          "object": "list",
                          "data": [
                              {
                                  "id": MODEL_NAME,
                                  "object": "model",
                                  "created": 1700000000,
                                  "owned_by": "vllm"
                              }
                          ]
                      })
                  else:
                      self.send_response(404)
                      self.end_headers()

          server = http.server.HTTPServer(("127.0.0.1", 8000), MockVllmHandler)
          print(f"[mock-vllm] Listening on port 8000 (model={MODEL_NAME})", flush=True)
          server.serve_forever()
          PYEOF
          echo "Mock server script written to /tmp/mock_vllm_server.py"

      # -----------------------------------------------------------------------
      # Start mock vLLM server (happy path)
      # -----------------------------------------------------------------------
      - name: Start mock vLLM server
        run: |
          python3 /tmp/mock_vllm_server.py &
          echo $! > /tmp/mock_vllm.pid
          echo "Mock vLLM server started with PID $(cat /tmp/mock_vllm.pid)"

      - name: Wait for mock vLLM server to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Mock vLLM server is ready."
              break
            fi
            echo "Waiting for mock server... attempt $i/15"
            sleep 1
          done
          curl -sf http://localhost:8000/health > /dev/null || {
            echo "ERROR: Mock vLLM server did not start in time."
            exit 1
          }

      # -----------------------------------------------------------------------
      # Happy path: script must exit 0 (healthy) when /v1/models returns model
      # -----------------------------------------------------------------------
      - name: Test healthcheck — happy path (expect exit 0)
        env:
          VLLM_PORT: "8000"
        run: |
          echo "=== Running vllm/healthcheck.sh against mock server ==="
          ./vllm/healthcheck.sh
          echo "=== healthcheck.sh exited 0 — PASS ==="

      # -----------------------------------------------------------------------
      # Verify /v1/models endpoint directly (belt-and-suspenders)
      # -----------------------------------------------------------------------
      - name: Verify /v1/models response format
        run: |
          echo "=== Checking /v1/models response ==="
          response=$(curl -sf http://localhost:8000/v1/models)
          echo "Response: $response"

          # Must have HTTP 200 and "data" array with at least one entry
          model_count=$(echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(len(data.get('data', [])))
          ")
          echo "Model count: $model_count"

          if [ "$model_count" -lt 1 ]; then
            echo "ERROR: /v1/models returned no models"
            exit 1
          fi
          echo "✓ /v1/models returned $model_count model(s) — PASS"

      # -----------------------------------------------------------------------
      # Failure path: script must exit 1 when no server is running
      # -----------------------------------------------------------------------
      - name: Stop mock vLLM server
        run: |
          if [ -f /tmp/mock_vllm.pid ]; then
            kill "$(cat /tmp/mock_vllm.pid)" 2>/dev/null || true
            rm -f /tmp/mock_vllm.pid
            echo "Mock vLLM server stopped."
          fi

      - name: Test healthcheck — failure path (expect exit 1)
        env:
          VLLM_PORT: "8000"
        run: |
          echo "=== Running vllm/healthcheck.sh with no server running ==="
          if ./vllm/healthcheck.sh 2>/dev/null; then
            echo "ERROR: healthcheck.sh exited 0 but no server was running — FAIL"
            exit 1
          else
            echo "✓ healthcheck.sh correctly exited non-zero — PASS"
          fi

  # ---------------------------------------------------------------------------
  # Validate the Dockerfile HEALTHCHECK instruction is correctly wired to the
  # healthcheck script (static analysis — no container runtime required).
  # ---------------------------------------------------------------------------
  vllm-dockerfile-healthcheck:
    name: vLLM Dockerfile HEALTHCHECK wired correctly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify HEALTHCHECK directive exists in Dockerfile
        run: |
          echo "=== Checking vllm/Dockerfile for HEALTHCHECK directive ==="
          if grep -q "^HEALTHCHECK" vllm/Dockerfile; then
            echo "✓ HEALTHCHECK directive found in vllm/Dockerfile"
          else
            echo "✗ No HEALTHCHECK directive in vllm/Dockerfile"
            exit 1
          fi

      - name: Verify HEALTHCHECK references the healthcheck script
        run: |
          if grep -q "healthcheck.sh" vllm/Dockerfile; then
            echo "✓ Dockerfile HEALTHCHECK references healthcheck.sh"
          else
            echo "✗ Dockerfile HEALTHCHECK does not reference healthcheck.sh"
            exit 1
          fi

      - name: Verify healthcheck script is copied into image
        run: |
          if grep -q "^COPY healthcheck.sh" vllm/Dockerfile; then
            echo "✓ healthcheck.sh is COPY'd into the image"
          else
            echo "✗ healthcheck.sh is NOT copied into the image via COPY instruction"
            exit 1
          fi

      - name: Verify healthcheck script checks /v1/models
        run: |
          if grep -q "/v1/models" vllm/healthcheck.sh; then
            echo "✓ vllm/healthcheck.sh verifies /v1/models endpoint"
          else
            echo "✗ vllm/healthcheck.sh does not check /v1/models"
            exit 1
          fi

      - name: Print HEALTHCHECK configuration
        run: |
          echo "=== HEALTHCHECK configuration in vllm/Dockerfile ==="
          grep "HEALTHCHECK" vllm/Dockerfile
          echo ""
          echo "=== vllm/healthcheck.sh ==="
          cat vllm/healthcheck.sh

  # ---------------------------------------------------------------------------
  # Validate that scripts/validate-api.sh correctly detects a live vLLM server
  # and reports the OpenAI-compatible API endpoints as healthy.
  #
  # Tests three scenarios:
  #   1. Happy path — /health + /v1/models + /v1/chat/completions all pass
  #   2. Skip-inference path — only /health and /v1/models tested (SKIP_INFERENCE_TEST=true)
  #   3. Failure path — no server running; script must exit non-zero
  #
  # No GPU or container runtime is required — a Python mock HTTP server is used.
  # This validates Sub-AC 3: the API validation script correctly confirms the
  # vLLM OpenAI-compatible endpoints respond to health-check and model-listing.
  # ---------------------------------------------------------------------------
  validate-api-script:
    name: validate-api.sh against mock vLLM server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make validate-api.sh executable
        run: chmod +x scripts/validate-api.sh

      # -----------------------------------------------------------------------
      # Write mock vLLM server to a file.
      # Handles all three endpoints tested by validate-api.sh:
      #   GET  /health                  → 200 {}
      #   GET  /v1/models               → 200 OpenAI model-list JSON
      #   POST /v1/chat/completions     → 200 OpenAI chat completion JSON
      # -----------------------------------------------------------------------
      - name: Write mock vLLM server script
        run: |
          cat > /tmp/mock_vllm_full.py << 'PYEOF'
          import http.server
          import json
          import os

          MODEL_NAME = os.environ.get("MODEL_NAME", "Qwen/Qwen2.5-7B-Instruct-AWQ")

          class MockVllmHandler(http.server.BaseHTTPRequestHandler):
              def log_message(self, fmt, *args):
                  print(f"[mock-vllm] {fmt % args}", flush=True)

              def send_json(self, code, body):
                  payload = json.dumps(body).encode()
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(payload)))
                  self.end_headers()
                  self.wfile.write(payload)

              def do_GET(self):
                  if self.path == "/health":
                      self.send_json(200, {})
                  elif self.path == "/v1/models":
                      self.send_json(200, {
                          "object": "list",
                          "data": [
                              {
                                  "id": MODEL_NAME,
                                  "object": "model",
                                  "created": 1700000000,
                                  "owned_by": "vllm"
                              }
                          ]
                      })
                  else:
                      self.send_response(404)
                      self.end_headers()

              def do_POST(self):
                  if self.path == "/v1/chat/completions":
                      content_len = int(self.headers.get("Content-Length", 0))
                      self.rfile.read(content_len)
                      self.send_json(200, {
                          "id": "chatcmpl-mock-0001",
                          "object": "chat.completion",
                          "created": 1700000000,
                          "model": MODEL_NAME,
                          "choices": [
                              {
                                  "index": 0,
                                  "message": {
                                      "role": "assistant",
                                      "content": "Hello"
                                  },
                                  "finish_reason": "stop"
                              }
                          ],
                          "usage": {
                              "prompt_tokens": 12,
                              "completion_tokens": 1,
                              "total_tokens": 13
                          }
                      })
                  else:
                      self.send_response(404)
                      self.end_headers()

          server = http.server.HTTPServer(("127.0.0.1", 8000), MockVllmHandler)
          print(f"[mock-vllm] Listening on port 8000 (model={MODEL_NAME})", flush=True)
          server.serve_forever()
          PYEOF
          echo "Mock vLLM server script written to /tmp/mock_vllm_full.py"

      # -----------------------------------------------------------------------
      # Start mock vLLM server
      # -----------------------------------------------------------------------
      - name: Start mock vLLM server
        run: |
          python3 /tmp/mock_vllm_full.py &
          echo $! > /tmp/mock_vllm_full.pid
          echo "Mock vLLM server started with PID $(cat /tmp/mock_vllm_full.pid)"

      - name: Wait for mock vLLM server to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Mock vLLM server is ready."
              break
            fi
            echo "Waiting for mock server... attempt $i/15"
            sleep 1
          done
          curl -sf http://localhost:8000/health > /dev/null || {
            echo "ERROR: Mock vLLM server did not start in time."
            exit 1
          }

      # -----------------------------------------------------------------------
      # Verify each endpoint individually before running validate-api.sh
      # -----------------------------------------------------------------------
      - name: Verify GET /health returns HTTP 200
        run: |
          http_code=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "GET /health → HTTP ${http_code}"
          [ "${http_code}" = "200" ] || { echo "ERROR: Expected 200, got ${http_code}"; exit 1; }
          echo "✓ GET /health returned HTTP 200"

      - name: Verify GET /v1/models returns OpenAI-format JSON
        run: |
          echo "=== GET /v1/models ==="
          response=$(curl -sf http://localhost:8000/v1/models)
          echo "Response: ${response}"
          model_count=$(echo "${response}" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data.get('object') == 'list', 'object != list'
          models = data.get('data', [])
          assert isinstance(models, list), 'data is not a list'
          print(len(models))
          ")
          echo "Models listed: ${model_count}"
          [ "${model_count}" -ge 1 ] || { echo "ERROR: no models listed"; exit 1; }
          echo "✓ GET /v1/models returned ${model_count} model(s) in OpenAI format"

      - name: Verify POST /v1/chat/completions returns valid OpenAI response
        run: |
          echo "=== POST /v1/chat/completions ==="
          payload='{"model":"Qwen/Qwen2.5-7B-Instruct-AWQ","messages":[{"role":"user","content":"hi"}],"max_tokens":1}'
          response=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            http://localhost:8000/v1/chat/completions)
          echo "Response: ${response}"
          python3 -c "
          import sys, json
          data = json.loads('${response}')
          assert 'id' in data, 'missing id'
          assert 'choices' in data, 'missing choices'
          assert data['choices'][0]['message']['role'] == 'assistant', 'wrong role'
          assert data['choices'][0]['message']['content'], 'empty content'
          assert 'usage' in data, 'missing usage'
          print('✓ POST /v1/chat/completions returned valid OpenAI chat completion JSON')
          "

      # -----------------------------------------------------------------------
      # Happy path (full): all three endpoints tested — expect exit 0
      # -----------------------------------------------------------------------
      - name: Run validate-api.sh — full test (expect exit 0)
        env:
          VLLM_BASE_URL: "http://localhost:8000"
          MODEL_NAME: "Qwen/Qwen2.5-7B-Instruct-AWQ"
          CURL_TIMEOUT: "10"
          INFERENCE_TIMEOUT: "15"
          SKIP_INFERENCE_TEST: "false"
        run: |
          echo "=== Running scripts/validate-api.sh (full — all 3 endpoints) ==="
          ./scripts/validate-api.sh
          echo "=== validate-api.sh exited 0 — PASS ==="

      # -----------------------------------------------------------------------
      # Skip-inference path: only /health + /v1/models tested — expect exit 0
      # -----------------------------------------------------------------------
      - name: Run validate-api.sh — skip-inference mode (expect exit 0)
        env:
          VLLM_BASE_URL: "http://localhost:8000"
          MODEL_NAME: "Qwen/Qwen2.5-7B-Instruct-AWQ"
          CURL_TIMEOUT: "10"
          SKIP_INFERENCE_TEST: "true"
        run: |
          echo "=== Running scripts/validate-api.sh (SKIP_INFERENCE_TEST=true) ==="
          ./scripts/validate-api.sh
          echo "=== validate-api.sh exited 0 — PASS ==="

      # -----------------------------------------------------------------------
      # Stop mock server
      # -----------------------------------------------------------------------
      - name: Stop mock vLLM server
        run: |
          if [ -f /tmp/mock_vllm_full.pid ]; then
            kill "$(cat /tmp/mock_vllm_full.pid)" 2>/dev/null || true
            rm -f /tmp/mock_vllm_full.pid
            echo "Mock vLLM server stopped."
          fi

      # -----------------------------------------------------------------------
      # Failure path: no server running — script must exit non-zero
      # -----------------------------------------------------------------------
      - name: Run validate-api.sh — failure path (expect exit non-zero)
        env:
          VLLM_BASE_URL: "http://localhost:8000"
          SKIP_INFERENCE_TEST: "true"
        run: |
          echo "=== Running scripts/validate-api.sh with no server running ==="
          if ./scripts/validate-api.sh 2>/dev/null; then
            echo "ERROR: validate-api.sh exited 0 but no server was running — FAIL"
            exit 1
          else
            echo "✓ validate-api.sh correctly exited non-zero when no server is running — PASS"
          fi

  # ---------------------------------------------------------------------------
  # Test scripts/healthcheck_vllm.sh — the host-side /v1/models readiness
  # poller.  Verifies it:
  #   1. Exits 0 when http://localhost:8000/v1/models returns the expected model
  #   2. Exits 1 when no server is reachable within the timeout window
  #
  # Sub-AC 7: Automated healthcheck confirms vLLM responds on /v1/models
  #
  # No GPU or container runtime is required — a Python mock HTTP server is used.
  # ---------------------------------------------------------------------------
  vllm-models-poller-script:
    name: scripts/healthcheck_vllm.sh — /v1/models poller
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/healthcheck_vllm.sh

      # -----------------------------------------------------------------------
      # Write mock vLLM server that serves /health and /v1/models with the
      # expected model listed, simulating a fully-loaded vLLM instance.
      # -----------------------------------------------------------------------
      - name: Write mock vLLM server script
        run: |
          cat > /tmp/mock_vllm_models.py << 'PYEOF'
          import http.server
          import json
          import os

          MODEL_NAME = os.environ.get("MODEL_NAME", "Qwen/Qwen2.5-7B-Instruct-AWQ")

          class MockVllmHandler(http.server.BaseHTTPRequestHandler):
              def log_message(self, fmt, *args):
                  print(f"[mock-vllm] {fmt % args}", flush=True)

              def send_json(self, code, body):
                  payload = json.dumps(body).encode()
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(payload)))
                  self.end_headers()
                  self.wfile.write(payload)

              def do_GET(self):
                  if self.path == "/health":
                      self.send_json(200, {})
                  elif self.path == "/v1/models":
                      self.send_json(200, {
                          "object": "list",
                          "data": [
                              {
                                  "id": MODEL_NAME,
                                  "object": "model",
                                  "created": 1700000000,
                                  "owned_by": "vllm"
                              }
                          ]
                      })
                  else:
                      self.send_response(404)
                      self.end_headers()

          server = http.server.HTTPServer(("127.0.0.1", 8000), MockVllmHandler)
          print(f"[mock-vllm] Listening on port 8000 (model={MODEL_NAME})", flush=True)
          server.serve_forever()
          PYEOF
          echo "Mock vLLM server script written to /tmp/mock_vllm_models.py"

      # -----------------------------------------------------------------------
      # Start mock server and wait for it to be ready
      # -----------------------------------------------------------------------
      - name: Start mock vLLM server
        run: |
          python3 /tmp/mock_vllm_models.py &
          echo $! > /tmp/mock_vllm_models.pid
          echo "Mock vLLM server started with PID $(cat /tmp/mock_vllm_models.pid)"

      - name: Wait for mock vLLM server to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Mock vLLM server is ready."
              break
            fi
            echo "Waiting for mock server... attempt $i/15"
            sleep 1
          done
          curl -sf http://localhost:8000/health > /dev/null || {
            echo "ERROR: Mock vLLM server did not start in time."
            exit 1
          }

      # -----------------------------------------------------------------------
      # Verify /v1/models returns the expected model before running the poller
      # -----------------------------------------------------------------------
      - name: Verify GET /v1/models returns expected model
        run: |
          echo "=== GET /v1/models ==="
          response=$(curl -sf http://localhost:8000/v1/models)
          echo "Response: ${response}"

          model_count=$(echo "${response}" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data.get('object') == 'list', 'object != list'
          models = data.get('data', [])
          print(len(models))
          ")
          echo "Model count: ${model_count}"
          [ "${model_count}" -ge 1 ] || { echo "ERROR: /v1/models returned no models"; exit 1; }

          model_id=$(echo "${response}" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['data'][0]['id'])
          ")
          echo "Model ID: ${model_id}"
          [ "${model_id}" = "Qwen/Qwen2.5-7B-Instruct-AWQ" ] || { echo "ERROR: unexpected model ID"; exit 1; }
          echo "✓ GET /v1/models returned 'Qwen/Qwen2.5-7B-Instruct-AWQ' in OpenAI list format — PASS"

      # -----------------------------------------------------------------------
      # Happy path: poller must exit 0 when /v1/models lists the expected model
      # -----------------------------------------------------------------------
      - name: Run healthcheck_vllm.sh — happy path (expect exit 0)
        env:
          VLLM_HOST_PORT: "8000"
          MODEL_NAME: "Qwen/Qwen2.5-7B-Instruct-AWQ"
          VLLM_HEALTH_TIMEOUT: "30"
          VLLM_HEALTH_INTERVAL: "2"
          VLLM_HEALTH_CURL_TIMEOUT: "5"
        run: |
          echo "=== Running scripts/healthcheck_vllm.sh against mock server ==="
          ./scripts/healthcheck_vllm.sh
          echo "=== healthcheck_vllm.sh exited 0 — PASS ==="

      # -----------------------------------------------------------------------
      # Accept-any-model path: MODEL_NAME="" means accept any model in /v1/models
      # -----------------------------------------------------------------------
      - name: Run healthcheck_vllm.sh — any-model mode (MODEL_NAME empty, expect exit 0)
        env:
          VLLM_HOST_PORT: "8000"
          MODEL_NAME: ""
          VLLM_HEALTH_TIMEOUT: "30"
          VLLM_HEALTH_INTERVAL: "2"
          VLLM_HEALTH_CURL_TIMEOUT: "5"
        run: |
          echo "=== Running scripts/healthcheck_vllm.sh (MODEL_NAME='', accept any model) ==="
          ./scripts/healthcheck_vllm.sh
          echo "=== healthcheck_vllm.sh exited 0 — PASS ==="

      # -----------------------------------------------------------------------
      # Stop mock server before failure path test
      # -----------------------------------------------------------------------
      - name: Stop mock vLLM server
        run: |
          if [ -f /tmp/mock_vllm_models.pid ]; then
            kill "$(cat /tmp/mock_vllm_models.pid)" 2>/dev/null || true
            rm -f /tmp/mock_vllm_models.pid
            echo "Mock vLLM server stopped."
          fi

      # -----------------------------------------------------------------------
      # Failure path: poller must exit 1 when no server is running
      # -----------------------------------------------------------------------
      - name: Run healthcheck_vllm.sh — failure path (expect exit 1)
        env:
          VLLM_HOST_PORT: "8000"
          MODEL_NAME: "Qwen/Qwen2.5-7B-Instruct-AWQ"
          VLLM_HEALTH_TIMEOUT: "5"
          VLLM_HEALTH_INTERVAL: "1"
          VLLM_HEALTH_CURL_TIMEOUT: "2"
        run: |
          echo "=== Running scripts/healthcheck_vllm.sh with no server running ==="
          if ./scripts/healthcheck_vllm.sh 2>/dev/null; then
            echo "ERROR: healthcheck_vllm.sh exited 0 but no server was running — FAIL"
            exit 1
          else
            echo "✓ healthcheck_vllm.sh correctly exited non-zero — PASS"
          fi

  # ---------------------------------------------------------------------------
  # Validate that scripts/healthcheck_vllm.sh is correctly wired:
  #   1. It polls the /v1/models endpoint (not just /health)
  #   2. It checks for the expected MODEL_NAME in the response
  #   3. It implements a configurable retry loop with timeout
  #
  # Static analysis — no server or container runtime required.
  # ---------------------------------------------------------------------------
  vllm-models-poller-static:
    name: scripts/healthcheck_vllm.sh static validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify script polls /v1/models (not just /health)
        run: |
          echo "=== Checking scripts/healthcheck_vllm.sh polls /v1/models ==="
          if grep -q "/v1/models" scripts/healthcheck_vllm.sh; then
            echo "✓ healthcheck_vllm.sh references /v1/models"
          else
            echo "✗ healthcheck_vllm.sh does not reference /v1/models"
            exit 1
          fi

      - name: Verify script checks MODEL_NAME in /v1/models response
        run: |
          echo "=== Checking scripts/healthcheck_vllm.sh validates MODEL_NAME ==="
          if grep -q "MODEL_NAME" scripts/healthcheck_vllm.sh; then
            echo "✓ healthcheck_vllm.sh validates MODEL_NAME in response"
          else
            echo "✗ healthcheck_vllm.sh does not validate MODEL_NAME"
            exit 1
          fi

      - name: Verify script has configurable timeout (VLLM_HEALTH_TIMEOUT)
        run: |
          echo "=== Checking scripts/healthcheck_vllm.sh has configurable timeout ==="
          if grep -q "VLLM_HEALTH_TIMEOUT" scripts/healthcheck_vllm.sh; then
            echo "✓ healthcheck_vllm.sh has configurable VLLM_HEALTH_TIMEOUT"
          else
            echo "✗ healthcheck_vllm.sh does not have VLLM_HEALTH_TIMEOUT"
            exit 1
          fi

      - name: Verify script uses curl to query /v1/models
        run: |
          echo "=== Checking scripts/healthcheck_vllm.sh uses curl ==="
          if grep -q "curl" scripts/healthcheck_vllm.sh; then
            echo "✓ healthcheck_vllm.sh uses curl to query the API"
          else
            echo "✗ healthcheck_vllm.sh does not use curl"
            exit 1
          fi

      - name: Print healthcheck_vllm.sh configuration defaults
        run: |
          echo "=== Default configuration in scripts/healthcheck_vllm.sh ==="
          grep -E "VLLM_HEALTH_(TIMEOUT|INTERVAL|CURL_TIMEOUT)|MODEL_NAME.*:-" \
              scripts/healthcheck_vllm.sh || true

  # ---------------------------------------------------------------------------
  # Test the OpenClaw in-container healthcheck (openclaw/healthcheck.sh)
  # against a lightweight Python mock HTTP server on port 18789 that returns
  # an HTML dashboard page.  No GPU, Docker, or Node.js installation required.
  #
  # Sub-AC 4: OpenClaw WebChat/Control UI dashboard is accessible from host at
  #           localhost:18789
  # ---------------------------------------------------------------------------
  openclaw-healthcheck-script:
    name: OpenClaw in-container healthcheck script
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make healthcheck script executable
        run: chmod +x openclaw/healthcheck.sh

      # -----------------------------------------------------------------------
      # Write a mock OpenClaw dashboard HTTP server that serves a minimal HTML
      # page on port 18789, simulating the real OpenClaw web UI.
      # -----------------------------------------------------------------------
      - name: Write mock OpenClaw dashboard server script
        run: |
          cat > /tmp/mock_openclaw_server.py << 'PYEOF'
          import http.server
          import os

          PORT = int(os.environ.get("OPENCLAW_PORT", "18789"))

          HTML_BODY = b"""<!DOCTYPE html>
          <html>
          <head><title>OpenClaw Dashboard</title></head>
          <body>
            <div id="app">OpenClaw AI Assistant</div>
          </body>
          </html>"""

          class MockOpenClawHandler(http.server.BaseHTTPRequestHandler):
              def log_message(self, fmt, *args):
                  print(f"[mock-openclaw] {fmt % args}", flush=True)

              def do_GET(self):
                  self.send_response(200)
                  self.send_header("Content-Type", "text/html; charset=utf-8")
                  self.send_header("Content-Length", str(len(HTML_BODY)))
                  self.end_headers()
                  self.wfile.write(HTML_BODY)

          server = http.server.HTTPServer(("127.0.0.1", PORT), MockOpenClawHandler)
          print(f"[mock-openclaw] Listening on port {PORT}", flush=True)
          server.serve_forever()
          PYEOF
          echo "Mock OpenClaw server script written to /tmp/mock_openclaw_server.py"

      - name: Start mock OpenClaw dashboard server
        run: |
          python3 /tmp/mock_openclaw_server.py &
          echo $! > /tmp/mock_openclaw.pid
          echo "Mock OpenClaw server started with PID $(cat /tmp/mock_openclaw.pid)"

      - name: Wait for mock OpenClaw server to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:18789/ > /dev/null 2>&1; then
              echo "Mock OpenClaw server is ready."
              break
            fi
            echo "Waiting for mock server... attempt $i/15"
            sleep 1
          done
          curl -sf http://localhost:18789/ > /dev/null || {
            echo "ERROR: Mock OpenClaw server did not start in time."
            exit 1
          }

      # -----------------------------------------------------------------------
      # Happy path: healthcheck.sh must exit 0 (healthy) when the dashboard
      # returns HTTP 200 with HTML content.
      # -----------------------------------------------------------------------
      - name: Test OpenClaw healthcheck — happy path (expect exit 0)
        env:
          OPENCLAW_PORT: "18789"
        run: |
          echo "=== Running openclaw/healthcheck.sh against mock dashboard ==="
          ./openclaw/healthcheck.sh
          echo "=== healthcheck.sh exited 0 — PASS ==="

      # -----------------------------------------------------------------------
      # Verify the dashboard response directly
      # -----------------------------------------------------------------------
      - name: Verify dashboard HTTP response
        run: |
          echo "=== Checking dashboard response at http://localhost:18789/ ==="
          http_code=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:18789/)
          echo "HTTP status: ${http_code}"
          [ "${http_code}" = "200" ] || { echo "ERROR: Expected 200, got ${http_code}"; exit 1; }
          echo "✓ Dashboard returned HTTP 200"

      - name: Verify dashboard response contains HTML content
        run: |
          echo "=== Checking dashboard HTML content ==="
          body=$(curl -sf http://localhost:18789/)
          echo "Body (first 200 chars): ${body:0:200}"
          if echo "${body}" | grep -qi -e '<!doctype' -e '<html' -e '<head' -e '<body' -e '<div'; then
            echo "✓ Dashboard response contains expected HTML content"
          else
            echo "ERROR: Dashboard response does not contain HTML markers"
            exit 1
          fi

      - name: Stop mock OpenClaw server
        run: |
          if [ -f /tmp/mock_openclaw.pid ]; then
            kill "$(cat /tmp/mock_openclaw.pid)" 2>/dev/null || true
            rm -f /tmp/mock_openclaw.pid
            echo "Mock OpenClaw server stopped."
          fi

      # -----------------------------------------------------------------------
      # Failure path: healthcheck.sh must exit 1 when no server is running
      # -----------------------------------------------------------------------
      - name: Test OpenClaw healthcheck — failure path (expect exit 1)
        env:
          OPENCLAW_PORT: "18789"
        run: |
          echo "=== Running openclaw/healthcheck.sh with no server running ==="
          if ./openclaw/healthcheck.sh 2>/dev/null; then
            echo "ERROR: healthcheck.sh exited 0 but no server was running — FAIL"
            exit 1
          else
            echo "✓ healthcheck.sh correctly exited non-zero — PASS"
          fi

  # ---------------------------------------------------------------------------
  # Test scripts/healthcheck_openclaw.sh — the host-side dashboard poller.
  # Verifies it:
  #   1. Exits 0 when http://localhost:18789 returns HTTP 200
  #   2. Exits 1 when no server is reachable within the timeout window
  #
  # Sub-AC 4: OpenClaw WebChat/Control UI dashboard is accessible from host at
  #           localhost:18789
  # ---------------------------------------------------------------------------
  openclaw-host-healthcheck-script:
    name: scripts/healthcheck_openclaw.sh host poller
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/healthcheck_openclaw.sh

      # -----------------------------------------------------------------------
      # Write a minimal HTML mock server on port 18789
      # -----------------------------------------------------------------------
      - name: Write mock OpenClaw dashboard server
        run: |
          cat > /tmp/mock_openclaw_host.py << 'PYEOF'
          import http.server
          import os

          PORT = int(os.environ.get("OPENCLAW_PORT", "18789"))
          HTML_BODY = b"<!DOCTYPE html><html><body><div>OpenClaw</div></body></html>"

          class Handler(http.server.BaseHTTPRequestHandler):
              def log_message(self, fmt, *args):
                  print(f"[mock-host-openclaw] {fmt % args}", flush=True)
              def do_GET(self):
                  self.send_response(200)
                  self.send_header("Content-Type", "text/html")
                  self.send_header("Content-Length", str(len(HTML_BODY)))
                  self.end_headers()
                  self.wfile.write(HTML_BODY)

          server = http.server.HTTPServer(("127.0.0.1", PORT), Handler)
          print(f"[mock-host-openclaw] Listening on port {PORT}", flush=True)
          server.serve_forever()
          PYEOF
          echo "Mock host server script written."

      - name: Start mock OpenClaw dashboard server
        run: |
          python3 /tmp/mock_openclaw_host.py &
          echo $! > /tmp/mock_openclaw_host.pid
          echo "Mock server started with PID $(cat /tmp/mock_openclaw_host.pid)"

      - name: Wait for mock server to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:18789/ > /dev/null 2>&1; then
              echo "Mock server is ready."
              break
            fi
            echo "Waiting... attempt $i/15"
            sleep 1
          done
          curl -sf http://localhost:18789/ > /dev/null || {
            echo "ERROR: Mock server did not start in time."
            exit 1
          }

      # -----------------------------------------------------------------------
      # Happy path: poller script must exit 0 when dashboard is reachable
      # -----------------------------------------------------------------------
      - name: Test healthcheck_openclaw.sh — happy path (expect exit 0)
        env:
          OPENCLAW_HOST_PORT: "18789"
          OPENCLAW_HEALTH_TIMEOUT: "15"
          OPENCLAW_HEALTH_INTERVAL: "1"
        run: |
          echo "=== Running scripts/healthcheck_openclaw.sh against mock server ==="
          ./scripts/healthcheck_openclaw.sh
          echo "=== healthcheck_openclaw.sh exited 0 — PASS ==="

      - name: Stop mock server
        run: |
          if [ -f /tmp/mock_openclaw_host.pid ]; then
            kill "$(cat /tmp/mock_openclaw_host.pid)" 2>/dev/null || true
            rm -f /tmp/mock_openclaw_host.pid
            echo "Mock server stopped."
          fi

      # -----------------------------------------------------------------------
      # Failure path: poller script must exit 1 when no server is available
      # -----------------------------------------------------------------------
      - name: Test healthcheck_openclaw.sh — failure path (expect exit 1)
        env:
          OPENCLAW_HOST_PORT: "18789"
          OPENCLAW_HEALTH_TIMEOUT: "5"
          OPENCLAW_HEALTH_INTERVAL: "1"
        run: |
          echo "=== Running scripts/healthcheck_openclaw.sh with no server running ==="
          if ./scripts/healthcheck_openclaw.sh 2>/dev/null; then
            echo "ERROR: healthcheck_openclaw.sh exited 0 but no server was running — FAIL"
            exit 1
          else
            echo "✓ healthcheck_openclaw.sh correctly exited non-zero — PASS"
          fi

  # ---------------------------------------------------------------------------
  # Validate that the OpenClaw Dockerfile HEALTHCHECK instruction is correctly
  # wired to the in-container healthcheck script.  Static analysis only —
  # no container runtime, GPU, or Node.js required.
  #
  # Sub-AC 4: OpenClaw WebChat/Control UI dashboard is accessible from host at
  #           localhost:18789
  # ---------------------------------------------------------------------------
  openclaw-dockerfile-healthcheck:
    name: OpenClaw Dockerfile HEALTHCHECK wired correctly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify HEALTHCHECK directive exists in Dockerfile
        run: |
          echo "=== Checking openclaw/Dockerfile for HEALTHCHECK directive ==="
          if grep -q "^HEALTHCHECK" openclaw/Dockerfile; then
            echo "✓ HEALTHCHECK directive found in openclaw/Dockerfile"
          else
            echo "✗ No HEALTHCHECK directive in openclaw/Dockerfile"
            exit 1
          fi

      - name: Verify HEALTHCHECK references the healthcheck script
        run: |
          if grep -q "healthcheck.sh" openclaw/Dockerfile; then
            echo "✓ Dockerfile HEALTHCHECK references healthcheck.sh"
          else
            echo "✗ Dockerfile HEALTHCHECK does not reference healthcheck.sh"
            exit 1
          fi

      - name: Verify healthcheck script is copied into image
        run: |
          if grep -q "^COPY healthcheck.sh" openclaw/Dockerfile; then
            echo "✓ healthcheck.sh is COPY'd into the image"
          else
            echo "✗ healthcheck.sh is NOT copied into the image via COPY instruction"
            exit 1
          fi

      - name: Verify EXPOSE 18789 is declared in Dockerfile
        run: |
          if grep -q "^EXPOSE 18789" openclaw/Dockerfile; then
            echo "✓ Port 18789 is declared via EXPOSE in openclaw/Dockerfile"
          else
            echo "✗ EXPOSE 18789 not found in openclaw/Dockerfile"
            exit 1
          fi

      - name: Verify OpenClaw binds to 0.0.0.0 (host-accessible)
        run: |
          echo "=== Checking that OpenClaw is configured to bind to 0.0.0.0 ==="
          if grep -q "0\.0\.0\.0" openclaw/Dockerfile openclaw/entrypoint.sh 2>/dev/null; then
            echo "✓ OpenClaw configured to bind to 0.0.0.0 (host-accessible)"
          else
            echo "✗ 0.0.0.0 binding not found — dashboard may not be reachable from host"
            exit 1
          fi

      - name: Verify start-openclaw.sh publishes port 18789 to host
        run: |
          echo "=== Checking that start-openclaw.sh maps port 18789 to host ==="
          if grep -q "\-p.*18789" scripts/start-openclaw.sh; then
            echo "✓ Port 18789 is published to host in scripts/start-openclaw.sh"
          else
            echo "✗ Port 18789 host mapping not found in scripts/start-openclaw.sh"
            exit 1
          fi

      - name: Verify healthcheck_openclaw.sh polls localhost:18789
        run: |
          if grep -q "localhost.*18789\|18789.*localhost\|OPENCLAW_HOST_PORT.*18789\|18789.*OPENCLAW_HOST_PORT" \
              scripts/healthcheck_openclaw.sh; then
            echo "✓ scripts/healthcheck_openclaw.sh polls localhost:18789"
          elif grep -q "localhost" scripts/healthcheck_openclaw.sh && \
               grep -q "OPENCLAW_HOST_PORT" scripts/healthcheck_openclaw.sh; then
            echo "✓ scripts/healthcheck_openclaw.sh polls localhost:\${OPENCLAW_HOST_PORT} (default 18789)"
          else
            echo "✗ scripts/healthcheck_openclaw.sh does not appear to poll localhost:18789"
            exit 1
          fi

      - name: Print OpenClaw HEALTHCHECK configuration
        run: |
          echo "=== HEALTHCHECK in openclaw/Dockerfile ==="
          grep "HEALTHCHECK" openclaw/Dockerfile
          echo ""
          echo "=== EXPOSE in openclaw/Dockerfile ==="
          grep "EXPOSE" openclaw/Dockerfile
          echo ""
          echo "=== Port mapping in scripts/start-openclaw.sh ==="
          grep -- "-p " scripts/start-openclaw.sh || grep "HOST_PORT" scripts/start-openclaw.sh
