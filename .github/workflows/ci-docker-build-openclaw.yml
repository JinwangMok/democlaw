name: Docker build — OpenClaw (dry-run)

# Performs a dry-run Docker build of the OpenClaw AI assistant Dockerfile.
# Uses --no-cache and --pull to ensure every layer is rebuilt from scratch and
# all base images are pulled fresh, verifying the Dockerfile is correct without
# relying on any cached state.
#
# No GPU or container runtime other than the standard Docker CLI is required.
# Images are built locally and never pushed to any registry.

on:
  push:
    branches: [main]
    paths:
      - "openclaw/Dockerfile"
      - "openclaw/**"
      - ".github/workflows/ci-docker-build-openclaw.yml"
  pull_request:
    branches: [main]
    paths:
      - "openclaw/Dockerfile"
      - "openclaw/**"
      - ".github/workflows/ci-docker-build-openclaw.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Dry-run Docker build of the OpenClaw AI assistant Dockerfile.
  # Flags:
  #   --no-cache  — never use the layer cache; every instruction is re-executed
  #   --pull      — always pull the latest version of the FROM base image
  # ---------------------------------------------------------------------------
  openclaw-docker-build:
    name: OpenClaw Dockerfile dry-run build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build OpenClaw image (--no-cache --pull)
        run: |
          echo "::group::Building openclaw/Dockerfile"
          docker build \
            --no-cache \
            --pull \
            --tag democlaw/openclaw:ci-dry-run \
            ./openclaw
          echo "::endgroup::"
          echo "✓ OpenClaw image built successfully"

      - name: Verify image exists locally (not pushed)
        run: |
          docker image inspect democlaw/openclaw:ci-dry-run > /dev/null 2>&1 \
            && echo "✓ democlaw/openclaw:ci-dry-run exists locally" \
            || { echo "✗ Image not found after build"; exit 1; }
          echo ""
          echo "Dry-run complete — image built but NOT pushed to any registry."

      - name: Show image metadata
        run: |
          echo "=== Image details ==="
          docker image inspect democlaw/openclaw:ci-dry-run \
            --format '{{json .Config.Labels}}' | python3 -m json.tool || true
          docker images democlaw/openclaw:ci-dry-run

      - name: Remove local image (cleanup)
        if: always()
        run: |
          docker rmi democlaw/openclaw:ci-dry-run 2>/dev/null || true
          echo "Local image removed."
