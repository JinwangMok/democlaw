name: OpenClaw Build Verify + Shell Script Lint

# =============================================================================
# Sub-AC 15.3 — CI workflow
#
# Purpose
# -------
# Implements two complementary CI steps as required by Sub-AC 15.3:
#
#   1. Dry-run build verification of the OpenClaw Dockerfile
#      Performs a full `docker build --no-cache --pull` of openclaw/Dockerfile
#      to verify the image can be constructed from scratch.  The OpenClaw image
#      uses FROM ubuntu:24.04 (~30 MB compressed), making a full build fast and
#      practical in CI without exhausting runner resources.  The resulting image
#      is built locally on the runner and is NEVER pushed to any registry.
#      "Dry-run" means: no registry push, no GPU required, no side-effects
#      beyond the ephemeral runner disk.
#
#   2. Shell script syntax validation (bash -n) and static analysis (shellcheck)
#      Every *.sh file tracked by git is checked with two tools:
#        - bash -n   : zero-dependency syntax parser; catches unclosed brackets,
#                      bad substitutions, and other parse-time errors instantly.
#        - shellcheck: industry-standard static analyser that finds common bugs,
#                      unquoted expansions, portability issues, and style problems.
#                      Annotations are emitted in GCC format so GitHub surfaces
#                      them as inline diff comments on pull requests.
#
# Both jobs must pass for the workflow to be marked green.  A gate job named
# "all-checks-passed" provides a single required status check for branch
# protection rules.
#
# No GPU, no container runtime other than Docker, and no paid dependencies.
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - "**/*.sh"
      - "openclaw/Dockerfile"
      - "openclaw/**"
      - ".github/workflows/ci-openclaw-build-verify-shellcheck.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.sh"
      - "openclaw/Dockerfile"
      - "openclaw/**"
      - ".github/workflows/ci-openclaw-build-verify-shellcheck.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Job 1: Dry-run build verification — openclaw/Dockerfile
  #
  # Runs `docker build --no-cache --pull` on the OpenClaw Dockerfile.
  #
  # Why a full build (not just --check)?
  # ─────────────────────────────────────
  # The OpenClaw image uses `FROM ubuntu:24.04`, a small (~30 MB compressed)
  # base image.  A full build exercises every RUN instruction, resolves every
  # COPY, and confirms the Node.js + npm installation succeeds — providing a
  # much stronger guarantee than a structural syntax check alone.
  #
  # "Dry-run" semantics in this context:
  #   ✓ No image is pushed to any container registry
  #   ✓ No GPU or nvidia-container-toolkit is required
  #   ✓ The image is deleted from the runner at the end of the job
  #   ✓ No production environment is affected in any way
  #
  # Flags:
  #   --no-cache  rebuild every layer; never use the GitHub Actions layer cache
  #   --pull      always fetch the latest ubuntu:24.04 digest to detect regressions
  # ===========================================================================
  openclaw-dockerfile-build-verify:
    name: "OpenClaw Dockerfile — dry-run build (no push)"
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 0. Checkout the repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Set up Docker Buildx (enables BuildKit for richer build output and
      #    consistent build behaviour with local development).
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # 2. Log environment versions for CI log traceability.
      # -----------------------------------------------------------------------
      - name: Show Docker & Buildx versions
        run: |
          echo "=== Docker version ==="
          docker version --format 'Client: {{.Client.Version}}  Server: {{.Server.Version}}'
          echo ""
          echo "=== Buildx version ==="
          docker buildx version
          echo ""
          echo "=== Runner OS ==="
          uname -a

      # -----------------------------------------------------------------------
      # 3. Guard: verify openclaw/Dockerfile is present before the build.
      #    Emits a clear error annotation rather than a cryptic build failure.
      # -----------------------------------------------------------------------
      - name: Verify openclaw/Dockerfile exists
        run: |
          if [ ! -f "openclaw/Dockerfile" ]; then
            echo "::error file=openclaw/Dockerfile::Dockerfile not found: openclaw/Dockerfile"
            echo ""
            echo "The OpenClaw Dockerfile is required for the dry-run build but was"
            echo "not found.  Ensure openclaw/Dockerfile is committed to the repository."
            exit 1
          fi

          echo "✓ openclaw/Dockerfile found"
          echo ""
          echo "=== Dockerfile summary ==="
          printf "  Lines      : %s\n" "$(wc -l < openclaw/Dockerfile)"
          printf "  FROM       : %s\n" "$(grep -m1 '^FROM' openclaw/Dockerfile || echo '(not found)')"
          printf "  EXPOSE     : %s\n" "$(grep '^EXPOSE'     openclaw/Dockerfile || echo '(not found)')"
          printf "  ENTRYPOINT : %s\n" "$(grep '^ENTRYPOINT' openclaw/Dockerfile || echo '(not found)')"
          printf "  CMD        : %s\n" "$(grep '^CMD'        openclaw/Dockerfile || echo '(not found)')"

      # -----------------------------------------------------------------------
      # 4. Dry-run build of openclaw/Dockerfile
      #
      # Full docker build using:
      #   --no-cache : every instruction is re-executed from scratch
      #   --pull     : always pull the latest ubuntu:24.04 digest
      #
      # The image is tagged with a CI-specific label so it can be identified
      # and cleaned up in the next step.  It is NOT pushed anywhere.
      # -----------------------------------------------------------------------
      - name: "docker build openclaw/Dockerfile (--no-cache --pull, no push)"
        run: |
          echo "::group::Building openclaw/Dockerfile"
          echo "  Context    : ./openclaw"
          echo "  Tag        : democlaw/openclaw:ci-build-verify-sub-ac-15-3"
          echo "  Flags      : --no-cache --pull"
          echo "  Push       : NO"
          echo ""

          docker build \
            --no-cache \
            --pull \
            --tag democlaw/openclaw:ci-build-verify-sub-ac-15-3 \
            ./openclaw

          build_exit=$?
          echo "::endgroup::"

          if [ "${build_exit}" -eq 0 ]; then
            echo ""
            echo "✓ openclaw/Dockerfile built successfully (exit 0)"
            echo "  Image is local to this runner — NOT pushed to any registry."
          else
            echo ""
            echo "✗ openclaw/Dockerfile build FAILED (exit ${build_exit})"
            echo ""
            echo "Likely causes:"
            echo "  - Syntax error in the Dockerfile"
            echo "  - Missing COPY source file"
            echo "  - Failed RUN instruction (network, missing apt package, etc.)"
            echo "  - Invalid base image reference"
            exit "${build_exit}"
          fi

      # -----------------------------------------------------------------------
      # 5. Verify the image exists locally (confirms the build actually ran
      #    and the resulting image was not pushed somewhere else).
      # -----------------------------------------------------------------------
      - name: Verify image exists locally (not pushed)
        run: |
          if docker image inspect democlaw/openclaw:ci-build-verify-sub-ac-15-3 \
              > /dev/null 2>&1; then
            echo "✓ democlaw/openclaw:ci-build-verify-sub-ac-15-3 exists locally"
          else
            echo "✗ Image not found after build — this should not happen"
            exit 1
          fi

          echo ""
          echo "=== Image details ==="
          docker images democlaw/openclaw:ci-build-verify-sub-ac-15-3
          echo ""
          docker image inspect democlaw/openclaw:ci-build-verify-sub-ac-15-3 \
            --format '  ID      : {{.Id}}
  Size    : {{.Size}} bytes
  Created : {{.Created}}' || true
          echo ""
          echo "Dry-run complete — image built locally and NOT pushed to any registry."

      # -----------------------------------------------------------------------
      # 6. Cleanup: delete the local image from the runner.
      #    Runs even on failure to recover disk space.
      # -----------------------------------------------------------------------
      - name: Remove local image (cleanup)
        if: always()
        run: |
          if docker rmi democlaw/openclaw:ci-build-verify-sub-ac-15-3 \
              > /dev/null 2>&1; then
            echo "✓ Local image removed."
          else
            echo "  Image was not present (already removed or build failed early)."
          fi

  # ===========================================================================
  # Job 2: Shell script syntax validation
  #
  # Two complementary checkers run over every *.sh file tracked by git:
  #
  #   bash -n  (Step 3)
  #   ──────────────────
  #   Parses each script without executing it.  Reports syntax errors such as
  #   unclosed brackets, bad parameter substitutions, broken here-docs, and
  #   invalid compound commands.  Zero external dependencies; runs as fast as
  #   bash itself.  Acts as an independent quality gate even if shellcheck is
  #   unavailable.
  #
  #   shellcheck  (Step 4)
  #   ─────────────────────
  #   Industry-standard static analyser that catches:
  #     - Unquoted variable expansions (word-splitting / glob risks)
  #     - Incorrect use of [ vs [[ and == vs =
  #     - Pipes to while loops losing variable scope (SC2031)
  #     - Missing `local` declarations inside functions
  #     - Portability issues between bash versions and shells
  #     - Hundreds of other patterns that cause hard-to-debug runtime failures
  #
  #   Annotations are emitted in GCC format (--format=gcc) so GitHub surfaces
  #   them as inline comments on the pull request diff view.
  #
  #   --source-path=scripts allows shellcheck to follow `# shellcheck source=`
  #   directives used by the top-level orchestration scripts when they source
  #   shared library files from scripts/lib/.
  #
  # Both steps must pass.  The job exits non-zero if any script fails either
  # check, causing the workflow to be marked failed.
  # ===========================================================================
  shell-script-lint:
    name: "Shell scripts — bash -n syntax + shellcheck static analysis"
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 0. Checkout the repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Install ShellCheck from the Ubuntu package repository.
      #    ubuntu-latest runners ship shellcheck but installing explicitly pins
      #    the step to a known package and logs the version for traceability.
      # -----------------------------------------------------------------------
      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          echo "ShellCheck version: $(shellcheck --version | grep 'version:')"

      # -----------------------------------------------------------------------
      # 2. Discover all tracked shell scripts.
      #    Uses `git ls-files` so only committed files are checked — untracked
      #    or ignored files are not included.
      # -----------------------------------------------------------------------
      - name: Discover shell scripts
        id: discover
        run: |
          mapfile -t scripts < <(git ls-files '*.sh' | sort)
          count="${#scripts[@]}"

          echo "Found ${count} shell script(s) in the repository:"
          printf '  %s\n' "${scripts[@]}"
          echo ""

          if [ "${count}" -eq 0 ]; then
            echo "::warning::No shell scripts found.  Skipping bash -n and shellcheck."
            echo "found=false" >> "${GITHUB_OUTPUT}"
          else
            echo "found=true"         >> "${GITHUB_OUTPUT}"
            echo "count=${count}"     >> "${GITHUB_OUTPUT}"
          fi

      # -----------------------------------------------------------------------
      # 3. Syntax validation — bash -n
      #
      # bash -n reads each script without executing it and returns a non-zero
      # exit code on any parse error.  The loop continues through all scripts
      # so every failing script is reported in a single CI run rather than
      # stopping at the first failure.
      #
      # Each script gets its own ::group:: collapsible section in the GitHub
      # Actions log for easy navigation.
      # -----------------------------------------------------------------------
      - name: Syntax validation (bash -n)
        if: steps.discover.outputs.found == 'true'
        run: |
          echo "=== bash --version ==="
          bash --version | head -1
          echo ""

          overall_exit=0
          passed=0
          failed=0

          while IFS= read -r script; do
            echo "::group::bash -n ${script}"
            if bash -n "${script}" 2>&1; then
              echo "✓ ${script} — syntax OK"
              passed=$(( passed + 1 ))
            else
              echo "✗ ${script} — SYNTAX ERROR (see output above)"
              failed=$(( failed + 1 ))
              overall_exit=1
            fi
            echo "::endgroup::"
          done < <(git ls-files '*.sh' | sort)

          echo ""
          echo "========================================"
          echo "  bash -n Results"
          echo "========================================"
          printf "  %-8s : %d\n" "Passed"  "${passed}"
          printf "  %-8s : %d\n" "Failed"  "${failed}"
          printf "  %-8s : %d\n" "Total"   "$(( passed + failed ))"
          echo "========================================"

          if [ "${overall_exit}" -ne 0 ]; then
            echo ""
            echo "ERROR: One or more scripts contain bash syntax errors."
            echo "Fix the errors above and re-push."
          fi

          exit "${overall_exit}"

      # -----------------------------------------------------------------------
      # 4. Static analysis — shellcheck
      #
      # Flags used:
      #   --severity=warning   report warnings and above (not just errors)
      #   --shell=bash         all scripts in this repo target bash
      #   --format=gcc         GCC-style annotations; GitHub renders these as
      #                        inline diff comments on pull requests
      #   --source-path=scripts  resolve `# shellcheck source=lib/runtime.sh`
      #                          directives used in the orchestration scripts
      #
      # The loop continues through all scripts so every failure is visible in
      # a single run.  The overall exit code is set to 1 if any script fails.
      # -----------------------------------------------------------------------
      - name: Static analysis (shellcheck)
        if: steps.discover.outputs.found == 'true'
        run: |
          sc_version=$(shellcheck --version | grep 'version:' | awk '{print $2}')
          echo "=== ShellCheck version: ${sc_version} ==="
          echo ""

          overall_exit=0
          passed=0
          failed=0

          while IFS= read -r script; do
            echo "::group::shellcheck ${script}"
            if shellcheck \
                --severity=warning \
                --shell=bash \
                --format=gcc \
                --source-path=scripts \
                "${script}"; then
              echo "✓ ${script} — passed"
              passed=$(( passed + 1 ))
            else
              echo "✗ ${script} — FAILED (see annotations above)"
              failed=$(( failed + 1 ))
              overall_exit=1
            fi
            echo "::endgroup::"
          done < <(git ls-files '*.sh' | sort)

          echo ""
          echo "========================================"
          echo "  ShellCheck Results"
          echo "========================================"
          printf "  %-8s : %s\n" "Version" "${sc_version}"
          printf "  %-8s : %d\n" "Passed"  "${passed}"
          printf "  %-8s : %d\n" "Failed"  "${failed}"
          printf "  %-8s : %d\n" "Total"   "$(( passed + failed ))"
          echo "========================================"

          if [ "${overall_exit}" -ne 0 ]; then
            echo ""
            echo "ERROR: One or more scripts failed ShellCheck analysis."
            echo "Review the inline annotations on the pull request diff view,"
            echo "or run  shellcheck --severity=warning <script>  locally."
          fi

          exit "${overall_exit}"

      # -----------------------------------------------------------------------
      # 5. Final gate — emit a summary line with the total count of checked
      #    scripts.  Runs unconditionally after the analysis steps.
      # -----------------------------------------------------------------------
      - name: Report result
        if: always() && steps.discover.outputs.found == 'true'
        run: |
          total="${{ steps.discover.outputs.count }}"
          echo "Shell-script lint complete — ${total} script(s) checked."
          echo "Checks performed: bash -n (syntax) + shellcheck (static analysis)"

  # ===========================================================================
  # Gate job: require BOTH the Dockerfile build and the shell-script lint to
  # pass before marking this workflow green.
  #
  # This job acts as the single required status check that branch-protection
  # rules can point to, rather than requiring two separate required checks.
  #
  # if: always() ensures the gate runs even when a parent job is cancelled or
  # skipped, and it will correctly report failure in those cases.
  # ===========================================================================
  all-checks-passed:
    name: "Sub-AC 15.3 — all checks passed"
    runs-on: ubuntu-latest
    needs: [openclaw-dockerfile-build-verify, shell-script-lint]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          build_result="${{ needs.openclaw-dockerfile-build-verify.result }}"
          lint_result="${{ needs.shell-script-lint.result }}"

          echo "========================================================"
          echo "  Sub-AC 15.3 CI Results"
          echo "========================================================"
          echo ""
          printf "  %-50s : %s\n" \
            "OpenClaw Dockerfile dry-run build (no push)" \
            "${build_result}"
          printf "  %-50s : %s\n" \
            "Shell script lint (bash -n + shellcheck)" \
            "${lint_result}"
          echo ""

          failed=0

          if [ "${build_result}" != "success" ]; then
            echo "✗ OpenClaw Dockerfile dry-run build did not succeed (${build_result})"
            failed=1
          else
            echo "✓ OpenClaw Dockerfile dry-run build passed (no push)"
          fi

          if [ "${lint_result}" != "success" ]; then
            echo "✗ Shell script lint did not succeed (${lint_result})"
            failed=1
          else
            echo "✓ Shell script lint passed (bash -n + shellcheck)"
          fi

          echo ""

          if [ "${failed}" -ne 0 ]; then
            echo "========================================================"
            echo "  FAILED — one or more Sub-AC 15.3 checks did not pass."
            echo "  Review the individual job logs above for details."
            echo "========================================================"
            exit 1
          fi

          echo "========================================================"
          echo "  PASSED — all Sub-AC 15.3 checks satisfied:"
          echo "    ✓ openclaw/Dockerfile built (docker build --no-cache --pull)"
          echo "    ✓ No image pushed to any registry"
          echo "    ✓ All shell scripts pass bash -n syntax check"
          echo "    ✓ All shell scripts pass shellcheck static analysis"
          echo "    ✓ No GPU required (GPU is a runtime-only requirement)"
          echo "========================================================"
